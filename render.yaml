services:
  - type: web
    name: psiqmentor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: psiqmentor-data
      mountPath: /data
      sizeGB: 1
